<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #f8f9fa;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon { font-size: 22px; }

    .header-text h1 { font-size: 14px; font-weight: 600; }
    .header-text p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .body { padding: 14px 16px; }

    #status-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      min-height: 60px;
      font-size: 13px;
    }

    #status-box.scanning { color: #1a73e8; }
    #status-box.found    { color: #2e7d32; }
    #status-box.empty    { color: #f57c00; }
    #status-box.error    { color: #c62828; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .status-icon { font-size: 18px; }

    .img-list {
      margin-top: 8px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 11px;
      color: #555;
    }

    .img-list div {
      padding: 3px 0;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .img-list div:last-child { border-bottom: none; }

    .progress-bar-wrap {
      background: #e8eaf6;
      border-radius: 4px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: #1a73e8;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    .progress-text {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 5px;
    }

    #btn-download {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-download:hover:not(:disabled) { background: #1557b0; }

    #btn-download:disabled {
      background: #b0bec5;
      cursor: not-allowed;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #aaa;
      padding: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🖼️</div>
    <div class="header-text">
      <h1>AllImage Downloader</h1>
      <p>Download ảnh trong div.allImage</p>
    </div>
  </div>

  <div class="body">
    <div id="status-box" class="scanning">
      <div class="status-row">
        <span class="status-icon">🔍</span>
        <span id="status-text">Đang quét trang...</span>
      </div>
    </div>

    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>

    <br/>

    <button id="btn-download" disabled>⬇️ Download tất cả ảnh</button>
  </div>

  <div class="footer">Chỉ hoạt động trên trang có div.allImage</div>

  <script src="popup.js"></script>
</body>
</html>
